openapi: 3.0.3
info:
  title: Dish Ingredients Management API
  description: API for managing dishes, ingredients, and stock in a restaurant
  version: 1.0.0
  contact:
    name: F. Miharisoa David Fils RATIANDRAIBE
    email: miharisoadavidfils@gmail.com

servers:
  - url: http://localhost:8080
    description: Development server

paths:
  /ingredients:
    get:
      summary: Get all ingredients
      description: |
        Returns a list of JSON objects representing all ingredients, containing:
        - id
        - name
        - category
        - price
        The returned objects are those stored in the database.
      operationId: getAllIngredients
      tags:
        - Ingredients
      responses:
        '200':
          description: Successfully retrieved the list of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IngredientResponse'
              example:
                - id: 1
                  name: "Laitue"
                  category: "VEGETABLE"
                  price: 800.00
                - id: 2
                  name: "Tomate"
                  category: "VEGETABLE"
                  price: 600.00
                - id: 3
                  name: "Poulet"
                  category: "ANIMAL"
                  price: 4500.00
                - id: 4
                  name: "Chocolat"
                  category: "OTHER"
                  price: 3000.00
                - id: 5
                  name: "Beurre"
                  category: "DAIRY"
                  price: 2500.00
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingredients/{id}:
    get:
      summary: Get an ingredient by ID
      description: |
        Returns a JSON object representing the ingredient with the specified ID, containing:
        - id
        - name
        - category
        - price
      operationId: getIngredientById
      tags:
        - Ingredients
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the ingredient
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Successfully retrieved the ingredient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngredientResponse'
              example:
                id: 1
                name: "Laitue"
                category: "VEGETABLE"
                price: 800.00
        '404':
          description: Ingredient not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 404
                message: "Ingredient.id=999 is not found"
                timestamp: "2026-04-14T10:00:00Z"
                path: "/ingredients/999"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ingredients/{id}/stock:
    get:
      summary: Get ingredient stock value at a specific time
      description: |
        Returns a JSON object representing the stock value of the ingredient at a given moment, containing:
        - unit (PCS, KG, L)
        - stock quantity (decimal number)
        The query parameters 'at' and 'unit' are mandatory.
      operationId: getIngredientStock
      tags:
        - Ingredients
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the ingredient
          schema:
            type: integer
          example: 1
        - name: at
          in: query
          required: true
          description: Moment at which to calculate the stock (ISO-8601 format)
          schema:
            type: string
            format: date-time
          example: "2024-01-06T12:00:00Z"
        - name: unit
          in: query
          required: true
          description: Desired unit for the stock value
          schema:
            type: string
            enum:
              - PCS
              - KG
              - L
          example: "KG"
      responses:
        '200':
          description: Successfully retrieved the stock value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockResponse'
              example:
                unit: "KG"
                quantity: 4.8
        '400':
          description: Missing mandatory query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 400
                message: "Either mandatory query parameter `at` or `unit` is not provided."
                timestamp: "2026-04-14T10:00:00Z"
                path: "/ingredients/1/stock"
        '404':
          description: Ingredient not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 404
                message: "Ingredient.id=999 is not found"
                timestamp: "2026-04-14T10:00:00Z"
                path: "/ingredients/999/stock"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dishes:
    get:
      summary: Get all dishes with their ingredients
      description: |
        Returns a list of JSON objects representing all dishes, containing:
        - id
        - name
        - selling price
        - list of ingredients that compose the dish
        Each ingredient contains: id, name, category, and price
        The returned objects are those stored in the database.
      operationId: getAllDishes
      tags:
        - Dishes
      responses:
        '200':
          description: Successfully retrieved the list of dishes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DishResponse'
              example:
                - id: 1
                  name: "Salade fraiche"
                  sellingPrice: 3500.00
                  ingredients:
                    - id: 1
                      name: "Laitue"
                      category: "VEGETABLE"
                      price: 800.00
                    - id: 2
                      name: "Tomate"
                      category: "VEGETABLE"
                      price: 600.00
                - id: 2
                  name: "Poulet grille"
                  sellingPrice: 12000.00
                  ingredients:
                    - id: 3
                      name: "Poulet"
                      category: "ANIMAL"
                      price: 4500.00
                - id: 3
                  name: "Riz aux legumes"
                  sellingPrice: null
                  ingredients: [ ]
                - id: 4
                  name: "Gateau au chocolat"
                  sellingPrice: 8000.00
                  ingredients:
                    - id: 4
                      name: "Chocolat"
                      category: "OTHER"
                      price: 3000.00
                    - id: 5
                      name: "Beurre"
                      category: "DAIRY"
                      price: 2500.00
                - id: 5
                  name: "Salade de fruits"
                  sellingPrice: null
                  ingredients: [ ]
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dishes/{id}/ingredients:
    put:
      summary: Update the ingredient list of a dish
      description: |
        Modifies (attaches or detaches) the list of ingredients for the dish with the given ID.
        The request body must contain a list of JSON objects representing the ingredients to attach or detach.
        The request body is mandatory, otherwise a 400 status code is returned with an explicit message.

        If some ingredients provided in the request body do not exist in the database, these new elements are simply ignored.
        This endpoint only attaches or detaches ingredients, it does not modify ingredient information.
      operationId: updateDishIngredients
      tags:
        - Dishes
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the dish
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        description: List of ingredients to attach to the dish
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/DishIngredientRequest'
            example:
              - ingredientId: 1
                quantity: 0.30
                unit: "KG"
              - ingredientId: 2
                quantity: 0.25
                unit: "KG"
      responses:
        '200':
          description: Successfully updated the dish ingredients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DishResponse'
              example:
                id: 1
                name: "Salade fraiche"
                sellingPrice: 3500.00
                ingredients:
                  - id: 1
                    name: "Laitue"
                    category: "VEGETABLE"
                    price: 800.00
                  - id: 2
                    name: "Tomate"
                    category: "VEGETABLE"
                    price: 600.00
        '400':
          description: |
            Request body is empty or missing.
            Also returned when the request body is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 400
                message: "Request body must not be empty"
                timestamp: "2026-04-14T10:00:00Z"
                path: "/dishes/1/ingredients"
        '404':
          description: Dish not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 404
                message: "Dish.id=999 is not found"
                timestamp: "2026-04-14T10:00:00Z"
                path: "/dishes/999/ingredients"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    IngredientResponse:
      type: object
      required:
        - id
        - name
        - category
        - price
      properties:
        id:
          type: integer
          description: Unique identifier of the ingredient
          example: 1
        name:
          type: string
          description: Name of the ingredient
          example: "Laitue"
        category:
          type: string
          description: Category of the ingredient
          enum:
            - VEGETABLE
            - ANIMAL
            - MARINE
            - DAIRY
            - OTHER
          example: "VEGETABLE"
        price:
          type: number
          format: double
          description: Price of the ingredient
          example: 800.00

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          description: HTTP status code
          example: 404
        message:
          type: string
          description: Error message
          example: "Resource not found"
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the error
          example: "2026-04-14T10:00:00Z"
        path:
          type: string
          description: Request path that caused the error
          example: "/ingredients/999"

    StockResponse:
      type: object
      required:
        - unit
        - quantity
      properties:
        unit:
          type: string
          description: Unit of the stock value (PCS, KG, L)
          enum:
            - PCS
            - KG
            - L
          example: "KG"
        quantity:
          type: number
          format: double
          description: Stock quantity
          example: 4.8

    DishResponse:
      type: object
      required:
        - id
        - name
        - ingredients
      properties:
        id:
          type: integer
          description: Unique identifier of the dish
          example: 1
        name:
          type: string
          description: Name of the dish
          example: "Salade fraiche"
        sellingPrice:
          type: number
          format: double
          nullable: true
          description: Selling price of the dish (can be null)
          example: 3500.00
        ingredients:
          type: array
          description: List of ingredients that compose the dish
          items:
            $ref: '#/components/schemas/IngredientResponse'

    DishIngredientRequest:
      type: object
      required:
        - ingredientId
        - quantity
        - unit
      properties:
        ingredientId:
          type: integer
          description: Unique identifier of the ingredient to attach
          example: 1
        quantity:
          type: number
          format: double
          description: Quantity of the ingredient required for the dish
          example: 0.30
        unit:
          type: string
          description: Unit of the quantity (PCS, KG, L)
          enum:
            - PCS
            - KG
            - L
          example: "KG"